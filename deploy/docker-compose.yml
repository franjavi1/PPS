services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: bomberos_backend
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ../backend:/app
    env_file:
      - ../backend/.env
    depends_on:
      - postgres

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: bomberos_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  postgres:
    image: postgres:16
    container_name: bomberos_postgres
    restart: always
    environment:
      POSTGRES_DB: bomberos_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: